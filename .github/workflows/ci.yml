name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install system OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-osd

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src tests

      - name: Test
        run: pytest

      - name: Dependency security scan
        run: pip-audit

      - name: Docker build
        run: docker build -t passport-ocr-api:ci .
