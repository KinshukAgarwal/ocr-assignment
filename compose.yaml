services:
  passport-ocr-api:
    build:
      context: .
    image: passport-ocr-api:local
    ports:
      - "8000:8000"
    environment:
      PASSPORT_OCR_LOG_LEVEL: INFO
      PASSPORT_OCR_GOOGLE_FALLBACK_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
